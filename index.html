<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Experiencia Web AR - MindAR + A-Frame</title>

    <!-- =========================================================
         IMPORTACIÓN DE LIBRERÍAS
         - A-Frame 1.3.0: framework 3D basado en WebVR/WebXR.
         - MindAR Image Tracking: librería específica para el
           rastreo de imágenes (Image Tracking) compatible con A-Frame.
    ========================================================== -->
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <style>
        /* =========================================================
           ESTILOS GENERALES
           Eliminamos márgenes y desactivamos el scroll para que la
           escena AR ocupe toda la pantalla del dispositivo.
        ========================================================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #000;
        }

        /* =========================================================
           OVERLAY UI (PANTALLA DE INICIO)
           Esta capa se posiciona sobre la escena 3D (z-index alto)
           y cumple dos funciones:
           1) Informar al usuario que debe interactuar.
           2) Desbloquear el autoplay de video en navegadores móviles
              (iOS Safari y Chrome Android requieren interacción del
              usuario antes de permitir reproducir medios con audio).
        ========================================================== */
        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            color: #fff;
            text-align: center;
            padding: 20px;
            transition: opacity 0.4s ease;
        }

        #overlay h1 {
            font-size: 1.6rem;
            margin-bottom: 15px;
            font-weight: 300;
            letter-spacing: 1px;
        }

        #overlay p {
            font-size: 1rem;
            margin-bottom: 40px;
            opacity: 0.8;
            max-width: 320px;
            line-height: 1.5;
        }

        /* Botón central muy visible */
        #startButton {
            background: linear-gradient(135deg, #ff416c, #ff4b2b);
            color: #fff;
            border: none;
            padding: 18px 40px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(255, 65, 108, 0.4);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        #startButton:active {
            transform: scale(0.95);
            box-shadow: 0 5px 15px rgba(255, 65, 108, 0.4);
        }

        /* Clase para ocultar el overlay con fade-out */
        .hidden {
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <!-- =========================================================
         OVERLAY UI
         Pantalla inicial que bloquea la escena hasta que el usuario
         interactúe. Esto es crítico para desbloquear el audio/video
         en dispositivos móviles.
    ========================================================== -->
    <div id="overlay">
        <h1>Experiencia AR</h1>
        <p>Apunta tu cámara a la imagen objetivo para revelar el mural animado.</p>
        <button id="startButton">Tocar para Iniciar Experiencia</button>
    </div>

    <!-- =========================================================
         ESCENA A-FRAME CON MINDAR IMAGE TRACKING
         - embedded: integra la escena en el flujo del DOM.
         - mindar-image: activa el sistema de rastreo de imágenes
           y apunta al archivo .mind compilado.
         - autoStart="false": NO inicia la cámara automáticamente,
           esperamos a que el usuario toque el botón.
         - uiLoading / uiError / uiScanning: desactivamos la UI
           por defecto de MindAR para usar la nuestra.
    ========================================================== -->
    <a-scene
        embedded
        mindar-image="imageTargetSrc: ./assets/targets.mind; autoStart: false; uiLoading: no; uiError: no; uiScanning: no;"
        color-space="sRGB"
        renderer="colorManagement: true; physicallyCorrectLights: true; antialias: true;">

        <!-- =========================================================
             ASSETS
             Precargamos el video antes de que la escena lo necesite.
             Atributos clave:
             - loop: reproducción continua.
             - playsinline / webkit-playsinline: evita que iOS abra
               el video en pantalla completa.
             - muted: OBLIGATORIO para que autoplay funcione en la
               mayoría de navegadores móviles modernos.
        ========================================================== -->
        <a-assets>
            <video
                id="muralVideo"
                src="./assets/animacion.mp4"
                loop
                muted
                crossorigin="anonymous"
                playsinline
                webkit-playsinline
                preload="auto">
            </video>
        </a-assets>

        <!-- =========================================================
             CÁMARA
             La cámara estándar de A-Frame. MindAR la controlará
             automáticamente para superponer el contenido 3D sobre
             el feed de la cámara del dispositivo.
        ========================================================== -->
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <!-- =========================================================
             IMAGE TARGET (targetIndex: 0)
             Entidad que se ancla a la primera imagen del archivo
             targets.mind. Solo se hace visible cuando la cámara
             detecta la imagen objetivo.
        ========================================================== -->
        <a-entity id="target" mindar-image-target="targetIndex: 0">

            <!-- Video proyectado como un plano 2D.
                 Relación de aspecto 16:9 (1 x 0.5625).
                 Se posiciona centrado sobre el target. -->
            <a-video
                id="videoPlane"
                src="#muralVideo"
                width="1"
                height="0.5625"
                position="0 0 0"
                rotation="0 0 0">
            </a-video>

        </a-entity>

    </a-scene>

    <!-- =========================================================
         LÓGICA DE INTERACCIÓN (JavaScript)
         Se ejecuta al final del body para asegurar que el DOM
         está completamente cargado.
    ========================================================== -->
    <script>
        // Referencias a elementos del DOM
        const overlay = document.getElementById('overlay');
        const startButton = document.getElementById('startButton');
        const video = document.getElementById('muralVideo');
        const sceneEl = document.querySelector('a-scene');
        const targetEl = document.getElementById('target');

        // Estado para saber si la experiencia ya fue iniciada
        let experienceStarted = false;

        /**
         * =========================================================
         * HANDLER DEL BOTÓN DE INICIO
         * =========================================================
         * Al tocar el botón:
         * 1) Cargamos el video en memoria (video.load()).
         * 2) Intentamos reproducirlo y pausarlo inmediatamente para
         *    desbloquear el "autoplay" en el contexto de interacción
         *    del usuario (requisito de iOS Safari y Chrome Android).
         * 3) Ocultamos el overlay con una transición suave.
         * 4) Iniciamos MindAR (que enciende la cámara del dispositivo).
         */
        startButton.addEventListener('click', async () => {
            if (experienceStarted) return;
            experienceStarted = true;

            try {
                // Desbloquear el video: load + play + pause
                video.load();
                // Intentamos reproducir para "autorizar" el contexto
                const playPromise = video.play();
                if (playPromise !== undefined) {
                    await playPromise;
                    video.pause(); // Lo pausamos inmediatamente
                    video.currentTime = 0;
                }
            } catch (err) {
                console.warn('No se pudo desbloquear el video automáticamente:', err);
            }

            // Ocultar overlay con fade-out
            overlay.classList.add('hidden');

            // Esperamos un momento para que termine la transición
            setTimeout(() => {
                overlay.style.display = 'none';
            }, 400);

            // Iniciar MindAR (activa la cámara)
            // Verificamos que el componente mindar-image esté listo
            if (sceneEl.components['mindar-image']) {
                sceneEl.components['mindar-image'].start();
            } else {
                sceneEl.addEventListener('loaded', () => {
                    sceneEl.components['mindar-image'].start();
                });
            }
        });

        /**
         * =========================================================
         * EVENT LISTENERS DEL TARGET
         * =========================================================
         * MindAR emite eventos cuando detecta o pierde la imagen
         * objetivo. Aprovechamos estos eventos para sincronizar
         * la reproducción del video con la visibilidad del target.
         */

        // Cuando la imagen objetivo es detectada -> reproducir video
        targetEl.addEventListener('targetFound', () => {
            console.log('✅ Target encontrado - Reproduciendo video');
            video.currentTime = 0; // Reinicia el video cada vez que se detecta
            video.play().catch(err => {
                console.warn('No se pudo reproducir el video:', err);
            });
        });

        // Cuando la imagen objetivo se pierde -> pausar video
        targetEl.addEventListener('targetLost', () => {
            console.log('❌ Target perdido - Pausando video');
            video.pause();
        });

        /**
         * =========================================================
         * MANEJO DE ERRORES DE CARGA
         * =========================================================
         * Si el video falla al cargar, mostramos un mensaje al
         * usuario en lugar de dejarlo con una pantalla negra.
         */
        video.addEventListener('error', (e) => {
            console.error('Error al cargar el video:', e);
            alert('No se pudo cargar el video de la experiencia. Verifica que el archivo animacion.mp4 exista.');
        });
    </script>

</body>
</html>
