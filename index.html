<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dinoparque AR | Exhibición Interactiva</title>

    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

    <style>
        /* RESET Y ESTILOS BASE */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html {
            width: 100%; height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #050505;
        }

        /* INTERFAZ DE INICIO (OVERLAY) */
        #overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(5, 5, 5, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            color: #ffffff;
            text-align: center;
            padding: 30px;
            transition: opacity 0.4s ease;
        }

        #overlay h1 {
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 5px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        #overlay h2 {
            font-size: 1.1rem;
            font-weight: 300;
            color: #b3b3b3;
            margin-bottom: 40px;
        }

        .instructions {
            background: rgba(255, 255, 255, 0.05);
            border-left: 4px solid #8a0303;
            padding: 15px 20px;
            margin-bottom: 40px;
            border-radius: 0 8px 8px 0;
            text-align: left;
            max-width: 350px;
        }

        .instructions p {
            margin: 8px 0;
            font-size: 0.95rem;
            line-height: 1.4;
        }

        /* BOTÓN DE INICIO */
        #startButton {
            background: linear-gradient(135deg, #8a0303, #d32f2f);
            color: #fff;
            border: none;
            padding: 18px 45px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(138, 3, 3, 0.5);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            animation: pulse 2s infinite;
            transition: transform 0.2s ease;
        }

        #startButton:active { transform: scale(0.95); }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(211, 47, 47, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(211, 47, 47, 0); }
            100% { box-shadow: 0 0 0 0 rgba(211, 47, 47, 0); }
        }

        /* INTERFAZ DE ESCANEO */
        #scanning-ui {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 8888;
            pointer-events: none;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .reticle {
            width: 80%;
            max-width: 400px;
            aspect-ratio: 16 / 9;
            border: 2px dashed rgba(255, 255, 255, 0.5);
            border-radius: 10px;
            position: relative;
            animation: scanPulse 1.5s infinite alternate;
        }

        .reticle span {
            position: absolute; width: 30px; height: 30px; border-color: #d32f2f; border-style: solid;
        }
        .top-left { top: -5px; left: -5px; border-width: 4px 0 0 4px; }
        .top-right { top: -5px; right: -5px; border-width: 4px 4px 0 0; }
        .bottom-left { bottom: -5px; left: -5px; border-width: 0 0 4px 4px; }
        .bottom-right { bottom: -5px; right: -5px; border-width: 0 4px 4px 0; }

        .scan-text {
            margin-top: 25px;
            color: #fff;
            background: rgba(0, 0, 0, 0.6);
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        @keyframes scanPulse {
            0% { opacity: 0.6; transform: scale(0.98); }
            100% { opacity: 1; transform: scale(1.02); }
        }

        .hidden { opacity: 0 !important; pointer-events: none !important; }
    </style>
</head>
<body>

    <div id="overlay">
        <h1>Dinoparque</h1>
        <h2>Visión Aumentada</h2>
        
        <div class="instructions">
            <p><strong>1.</strong> Toca el botón para iniciar.</p>
            <p><strong>2.</strong> Concede permiso de cámara.</p>
            <p><strong>3.</strong> Apunta al mural para darle vida.</p>
        </div>

        <button id="startButton">Iniciar Experiencia</button>
    </div>

    <div id="scanning-ui">
        <div class="reticle">
            <span class="top-left"></span>
            <span class="top-right"></span>
            <span class="bottom-left"></span>
            <span class="bottom-right"></span>
        </div>
        <div class="scan-text">Buscando pintura en el muro...</div>
    </div>

    <a-scene
        mindar-image="imageTargetSrc: ./assets/targets.mind; autoStart: false; uiLoading: no; uiError: no; uiScanning: no;"
        color-space="sRGB"
        renderer="colorManagement: true, physicallyCorrectLights"
        vr-mode-ui="enabled: false"
        device-orientation-permission-ui="enabled: false">

        <a-assets>
            <video
                id="muralVideo"
                src="./assets/animacion.mp4"
                loop
                muted
                crossorigin="anonymous"
                playsinline
                webkit-playsinline>
            </video>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity id="target" mindar-image-target="targetIndex: 0">
            <a-plane 
                src="#muralVideo" 
                width="1" 
                height="0.5625" 
                position="0 0 0" 
                rotation="0 0 0">
            </a-plane>
        </a-entity>

    </a-scene>

    <script>
        const overlay = document.getElementById('overlay');
        const startButton = document.getElementById('startButton');
        const scanningUI = document.getElementById('scanning-ui');
        const video = document.getElementById('muralVideo');
        const sceneEl = document.querySelector('a-scene');
        const targetEl = document.getElementById('target');

        let experienceStarted = false;

        startButton.addEventListener('click', () => {
            if (experienceStarted) return;
            experienceStarted = true;

            // Desbloqueo de video para móviles
            video.muted = true;
            video.play().then(() => {
                video.pause();
                video.currentTime = 0;
            }).catch((e) => {
                console.warn("Nota de autoplay:", e);
            });

            // Transición de interfaz
            overlay.classList.add('hidden');
            setTimeout(() => { overlay.style.display = 'none'; }, 400);
            scanningUI.style.display = 'flex';

            // Forzar inicio estricto del motor AR
            if (sceneEl.hasLoaded) {
                sceneEl.components['mindar-image'].start();
            } else {
                sceneEl.addEventListener('loaded', () => {
                    sceneEl.components['mindar-image'].start();
                });
            }
        });

        // REPRODUCCIÓN AL ENCONTRAR TARGET
        targetEl.addEventListener('targetFound', () => {
            scanningUI.classList.add('hidden');
            video.currentTime = 0;
            video.play();
        });

        // PAUSA AL PERDER TARGET
        targetEl.addEventListener('targetLost', () => {
            scanningUI.classList.remove('hidden');
            video.pause();
        });
    </script>
</body>
</html>
